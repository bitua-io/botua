name: Build Botua Image

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'extension/**'
      - 'prompts/**'
      - 'docker/Dockerfile'
      - 'package.json'
      - 'bun.lock'
      - '.gitea/workflows/build-image.yml'
  workflow_dispatch:

env:
  REGISTRY: gitea.bitua.io
  IMAGE_NAME: bitua/botua

jobs:
  build:
    runs-on: arm64
    steps:
      - name: Checkout
        run: |
          rm -rf $GITHUB_WORKSPACE/*
          cd $GITHUB_WORKSPACE
          git clone --depth 1 --branch ${GITHUB_REF_NAME} https://gitea.bitua.io/${GITHUB_REPOSITORY}.git .

      - name: Login to registry
        run: |
          echo "${{ secrets.PACKAGE_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          cd $GITHUB_WORKSPACE
          SHORT_SHA=$(echo $GITHUB_SHA | head -c 8)
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA} \
            -f docker/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest and :${SHORT_SHA}"
