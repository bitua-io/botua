# Botua — PR Review Workflow
#
# Add this file to any repo that should get automated PR reviews.
# Requires org secret: KIMI_API_KEY
#
# Runs directly on self-hosted ARM64 runners (bun + node already installed).

name: Botua Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: [self-hosted, ARM64]
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for PR diff generation

      - name: Clone Botua
        run: |
          rm -rf /tmp/botua
          git clone --depth 1 https://github.com/bitua-io/botua.git /tmp/botua
          cd /tmp/botua && bun install

      - name: Run review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          cd /tmp/botua
          bun run src/run.ts \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --repo-path "${{ github.workspace }}"

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/botua /tmp/botua-*.json
